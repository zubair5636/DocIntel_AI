<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <defs>
    <!-- Vibrant Blue-to-Emerald Gradient -->
    <linearGradient id="favicon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#3b82f6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Deep Slate rounded container -->
  <rect width="32" height="32" rx="8" fill="#090d16" />
  <rect width="30" height="30" x="1" y="1" rx="7" stroke="url(#favicon-grad)" stroke-width="1.5" stroke-opacity="0.15" />

  <!-- Document Silhouette -->
  <path d="M9 7C9 5.89543 9.89543 5 11 5H18L23 10V25C23 26.1046 22.1046 27 21 27H11C9.89543 27 9 26.1046 9 25V7Z" fill="url(#favicon-grad)" fill-opacity="0.1" stroke="url(#favicon-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Folded Corner -->
  <path d="M18 5V10H23" stroke="url(#favicon-grad)" stroke-width="2" stroke-linejoin="round" fill="none" />

  <!-- Abstract Tools/Spark Icon inside document -->
  <path d="M13 14H19" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" />
  <path d="M13 18H19" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" />
  <path d="M13 22H17" stroke="url(#favicon-grad)" stroke-width="1.5" stroke-linecap="round" />
</svg>
